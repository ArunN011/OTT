<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title> Register</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">



    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="login.css">

</head>

<body>

<div class="login-page">

<div class="container">

<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-xl-6 col-lg-7 col-md-9 col-sm-11">

<div class="login-card"
     data-aos="zoom-in">



<div class="text-center mb-4">

<a href="index.html"
   class="logo">

<img src="Adobe Express - file.png"
     alt="StreamHub">

</a>

<h2>

<i class="ri-user-add-fill"></i>

Create Account

</h2>

<p>

Create your StreamHub account and start streaming today.

</p>

</div>



<form id="registerForm">


<div class="mb-3">

<label class="form-label">

<i class="ri-user-3-fill"></i>

Full Name

</label>

<input
type="text"
class="form-control"
id="fullname"
placeholder="Enter your full name"
required>

</div>

<div class="mb-3">

<label class="form-label">

<i class="ri-user-settings-fill"></i>

Role

</label>

<select
class="form-select"
id="role"
required>

<option value="">

Select Role

</option>

<option>

User

</option>

<option>

Admin

</option>

</select>

</div>



<div class="mb-3">

<label class="form-label">

<i class="ri-mail-fill"></i>

Email Address

</label>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="mb-3">

<label class="form-label">

<i class="ri-smartphone-fill"></i>

Mobile Number

</label>

<input
type="tel"
class="form-control"
id="mobile"
placeholder="Enter mobile number"
maxlength="10"
required>

</div>



<div class="mb-3">

<label class="form-label">

<i class="ri-lock-password-fill"></i>

Password

</label>

<div class="password-box">

<input
type="password"
class="form-control"
id="password"
placeholder="Create password"
required>

<i class="ri-eye-line toggle-password"
id="togglePassword"></i>

</div>

</div>



<div class="mb-3">

<label class="form-label">

<i class="ri-lock-2-fill"></i>

Confirm Password

</label>

<div class="password-box">

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Confirm password"
required>

<i class="ri-eye-line toggle-confirm"
id="toggleConfirm"></i>

</div>

</div>



<div class="remember-row">

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="terms"
required>

<label class="form-check-label">

I agree to the

<a href="error.html">

Terms & Conditions

</a>

</label>

</div>

</div>



<button
type="submit"
class="btn btn-info login-btn w-100">

<i class="ri-user-add-fill"></i>

Create Account

</button>



<a href="index.html"
class="btn btn-outline-light w-100 mt-3">

<i class="ri-home-5-fill"></i>

Back To Home

</a>



<div class="signup-text">

Already have an account?

<a href="login.html">

<i class="ri-login-box-fill"></i>

Login

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({

duration:1000,

once:true

});



const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");

const togglePassword = document.getElementById("togglePassword");
const toggleConfirm = document.getElementById("toggleConfirm");

togglePassword.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        togglePassword.classList.replace("ri-eye-line","ri-eye-off-line");

    }

    else{

        password.type = "password";

        togglePassword.classList.replace("ri-eye-off-line","ri-eye-line");

    }

});

toggleConfirm.addEventListener("click", () => {

    if(confirmPassword.type === "password"){

        confirmPassword.type = "text";

        toggleConfirm.classList.replace("ri-eye-line","ri-eye-off-line");

    }

    else{

        confirmPassword.type = "password";

        toggleConfirm.classList.replace("ri-eye-off-line","ri-eye-line");

    }

});

document.getElementById("registerForm").addEventListener("submit",function(e){

    e.preventDefault();

    const fullname=document.getElementById("fullname").value.trim();

    const role=document.getElementById("role").value;

    const email=document.getElementById("email").value.trim();

    const mobile=document.getElementById("mobile").value.trim();

    const password=document.getElementById("password").value;

    const confirm=document.getElementById("confirmPassword").value;

    const terms=document.getElementById("terms").checked;

  

    if(fullname===""){

        Swal.fire({

            icon:"warning",

            title:"Full Name Required",

            text:"Please enter your full name."

        });

        return;

    }

   

    if(role===""){

        Swal.fire({

            icon:"warning",

            title:"Select Role",

            text:"Please select your role."

        });

        return;

    }

   

    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailRegex.test(email)){

        Swal.fire({

            icon:"error",

            title:"Invalid Email",

            text:"Please enter a valid email address."

        });

        return;

    }

    

    const mobileRegex=/^[6-9][0-9]{9}$/;

    if(!mobileRegex.test(mobile)){

        Swal.fire({

            icon:"error",

            title:"Invalid Mobile Number",

            text:"Enter a valid 10-digit mobile number."

        });

        return;

    }

  

    if(password.length < 6){

        Swal.fire({

            icon:"error",

            title:"Weak Password",

            text:"Password must contain at least 6 characters."

        });

        return;

    }

   

    if(password !== confirm){

        Swal.fire({

            icon:"error",

            title:"Password Mismatch",

            text:"Password and Confirm Password must be the same."

        });

        return;

    }

   

    if(!terms){

        Swal.fire({

            icon:"warning",

            title:"Accept Terms",

            text:"Please accept the Terms & Conditions."

        });

        return;

    }

   

    Swal.fire({

        icon:"success",

        title:"Account Created",

        text:"Registration completed successfully.",

        confirmButtonColor:"#00d4ff"

    }).then(()=>{

        window.location.href="login.html";

    });

});
</script>




</body>

</html>

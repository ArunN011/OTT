<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 || error</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#0d1117,#111827,#0d1117);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:#fff;

}

body::before{

content:"";

position:absolute;

width:450px;

height:450px;

background:#00d4ff30;

border-radius:50%;

top:-180px;

left:-180px;

filter:blur(100px);

animation:float1 8s infinite alternate;

}

body::after{

content:"";

position:absolute;

width:350px;

height:350px;

background:#ff3b3040;

border-radius:50%;

bottom:-150px;

right:-150px;

filter:blur(90px);

animation:float2 10s infinite alternate;

}

@keyframes float1{

to{

transform:translate(80px,80px);

}

}

@keyframes float2{

to{

transform:translate(-80px,-60px);

}

}

.error-card{

position:relative;

z-index:2;

width:90%;

max-width:700px;

padding:60px 40px;

text-align:center;

background:rgba(255,255,255,.05);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,.08);

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.4);

}

.error-icon{

width:120px;

height:120px;

margin:auto;

margin-bottom:25px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:#00d4ff;

animation:bounce 2s infinite;

}

.error-icon i{

font-size:60px;

color:#000;

}

@keyframes bounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}

.error-card h1{

font-size:110px;

font-weight:700;

color:#00d4ff;

line-height:1;

margin-bottom:15px;

}

.error-card h2{

font-size:36px;

margin-bottom:20px;

}

.error-card p{

color:#c7d2fe;

font-size:18px;

margin-bottom:40px;

line-height:1.7;

}

.error-buttons{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.error-buttons .btn{

padding:14px 30px;

font-size:16px;

font-weight:600;

border-radius:50px;

display:flex;

align-items:center;

gap:10px;

transition:.35s;

}

.error-buttons .btn:hover{

transform:translateY(-4px);

}


.error-footer{

margin-top:35px;

font-size:14px;

color:#94a3b8;

}


@media(max-width:768px){

.error-card{

padding:45px 20px;

}

.error-card h1{

font-size:80px;

}

.error-card h2{

font-size:28px;

}

.error-card p{

font-size:15px;

}

.error-icon{

width:90px;

height:90px;

}

.error-icon i{

font-size:45px;

}

.error-buttons{

flex-direction:column;

}

.error-buttons .btn{

width:100%;

justify-content:center;

}

}

</style>

</head>

<body>

<div class="error-card">

<div class="error-icon">

<i class="ri-error-warning-fill"></i>

</div>

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Oops! The page you're looking for doesn't exist or has been moved.
Let's get you back to exploring StreamHub.

</p>

<div class="error-buttons">

<a href="index.html" class="btn btn-info">

<i class="ri-home-5-fill"></i>

Back To Home

</a>

<button onclick="history.back()" class="btn btn-outline-light">

<i class="ri-arrow-left-line"></i>

Go Back

</button>

</div>

<div class="error-footer">

<i class="ri-live-fill text-info"></i>

Stackly &copy;2026 • Watch • Create • Inspire

</div>

</div>

</body>

</html>
